<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hypothesisor</title>
<style>
  body { font: 14px/1.5 -apple-system, system-ui, "PingFang SC", sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
  h1 { font-size: 20px; margin-bottom: 24px; }
  label { display: block; margin-bottom: 18px; }
  label > span { display: block; font-weight: 600; margin-bottom: 4px; }
  label > small { display: block; color: #777; font-size: 12px; margin-bottom: 6px; }
  input, select { width: 100%; padding: 8px; font: inherit; border: 1px solid #ddd; border-radius: 4px; }
  button { padding: 8px 18px; font: inherit; background: #2563EB; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:hover { background: #1d4fc4; }
  #status { margin-left: 12px; color: #1a7f3f; }
  a { color: #0969da; }
  .req { color: #BD1C2B; }
</style>
</head>
<body>
  <h1 data-i18n="options_h1">Hypothesisor Settings</h1>

  <label>
    <span><span data-i18n="options_label_token">Hypothesis Token</span> <span class="req">*</span></span>
    <small><span data-i18n="options_hint_token">Generate one at </span><a href="https://hypothes.is/account/developer" target="_blank">hypothes.is/account/developer</a></small>
    <input id="hypothesisToken" type="password" autocomplete="off" />
  </label>

  <label>
    <span><span data-i18n="options_label_bigmodel">BigModel API Key</span> <span class="req">*</span></span>
    <small id="bigmodelHint"></small>
    <input id="bigmodelKey" type="password" autocomplete="off" />
  </label>

  <label>
    <span data-i18n="options_label_mode">Default mode</span>
    <select id="defaultMode">
      <option value="general"  data-i18n="mode_general">general</option>
      <option value="academic" data-i18n="mode_academic">academic</option>
      <option value="news"     data-i18n="mode_news">news</option>
      <option value="tech"     data-i18n="mode_tech">tech</option>
    </select>
  </label>

  <label>
    <span data-i18n="options_label_style">Default style</span>
    <small data-i18n="options_hint_style">Preset key or custom description</small>
    <input id="defaultStyle" type="text" data-i18n-placeholder="options_style_placeholder" />
  </label>

  <div>
    <button id="save" data-i18n="options_btn_save">Save</button>
    <span id="status"></span>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
