<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hypothesisor</title>
<link rel="stylesheet" href="output.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="#"><span class="brand-chip">h.</span><span class="brand-name">Hypothesisor</span></a>
      <div class="topbar-meta" id="topbarMeta"></div>
      <div class="topbar-actions">
        <a id="openSource" class="action-link" target="_blank" rel="noopener" data-i18n="output_open_source">Open original</a>
        <button id="regenerate" class="action-link" type="button" data-i18n="output_regenerate">Regenerate</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="state-msg" data-i18n="output_loading">Loading…</div>
    <div id="empty" class="state-msg state-error" hidden data-i18n="output_not_found">Reformat not found.</div>
    <article id="content" hidden></article>
  </main>

  <footer class="footnote">
    <span data-i18n="output_footer">Generated by Hypothesisor · L3 generative app layer</span>
    · <a href="https://github.com/fxp/Hypothesisor" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script type="module" src="output.js"></script>
</body>
</html>
